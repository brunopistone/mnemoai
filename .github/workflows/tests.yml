name: Tests

# Run the unit test tier on every push and PR. The integration tier
# (-m integration) needs a live Ollama server + a real config.yaml, so it is
# excluded here and run manually before releases (see the release checklist).
on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Import sort check (ruff)
        # Gate on import sorting (the rule the project adopted via
        # extend-select=["I"]). Broader lint cleanup is tracked separately.
        run: ruff check --select I .
      - name: Unit tests
        run: PYTHONPATH=src python -m pytest -m "not integration"
